<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHARI Launch</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0066CC 0%, #004499 100%);
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #0066CC;
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #0066CC; }
        p { color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>CHARI</h2>
        <p>正在進行 SMART on FHIR 授權...</p>
    </div>
    <script>
        // SMART Launch Entry Point
        // 將 SMART launch 參數 (iss, launch) 轉傳給 React app
        // OAuth 授權邏輯在 React app 內處理（使用 Vite 環境變數保護憑證）
        var search = window.location.search;
        if (search) {
            // 帶上原始參數導向 React app
            window.location.replace('./index.html' + search);
        } else {
            window.location.replace('./index.html');
        }
    </script>
</body>
</html>
